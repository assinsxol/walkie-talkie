<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VR Classroom</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- ENVIRONMENT -->
  <script src="https://unpkg.com/aframe-environment-component@1.4.0/dist/aframe-environment-component.min.js"></script>

  <!-- JAVASCRIPT -->
  <script defer src="app.js"></script>
</head>

<body>

  <!-- ================================================= -->
  <!-- FILE UPLOAD UI -->
  <!-- ================================================= -->

  <div id="uploadUI">

    <h2>VR Teacher Controls</h2>

    <!-- PDF -->
    <label>Select PDF:</label>
    <input type="file" id="pdfInput" accept=".pdf">

    <!-- VIDEO -->
    <label>Select Video:</label>
    <input type="file" id="videoInput" accept="video/*">

    <!-- IMAGE -->
    <label>Select Image:</label>
    <input type="file" id="imageInput" accept="image/*">

  </div>

  <!-- ================================================= -->
  <!-- VR SCENE -->
  <!-- ================================================= -->

  <a-scene>

    <!-- ============================================= -->
    <!-- ASSETS -->
    <!-- ============================================= -->

    <a-assets>

      <!-- VIDEO -->
      <!-- ضع رابط الفيديو هنا -->
      <video
        id="lessonVideo"
        crossorigin="anonymous"
        playsinline
        webkit-playsinline
        loop
        src="https://cdn.aframe.io/videos/bunny.mp4">
      </video>

      <!-- IMAGE -->
      <!-- ضع رابط الصورة هنا -->
      <img
        id="lessonImage"
        src="https://cdn.aframe.io/a-painter/images/floor.jpg">

    </a-assets>

    <!-- ============================================= -->
    <!-- ENVIRONMENT -->
    <!-- ============================================= -->

    <a-entity
      environment="
        preset: forest;
        groundColor: #445;
        skyType: atmosphere;
      ">
    </a-entity>

    <!-- ============================================= -->
    <!-- LIGHTS -->
    <!-- ============================================= -->

    <a-light
      type="ambient"
      intensity="1.2">
    </a-light>

    <a-light
      type="directional"
      intensity="1"
      position="2 4 1">
    </a-light>

    <!-- ============================================= -->
    <!-- FLOOR -->
    <!-- ============================================= -->

    <a-plane
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#DDDDDD">
    </a-plane>

    <!-- ============================================= -->
    <!-- WHITEBOARD -->
    <!-- ============================================= -->

    <a-plane
      id="whiteboard"
      position="0 2 -4"
      width="6"
      height="3"
      color="white">
    </a-plane>

    <!-- ============================================= -->
    <!-- PDF SCREEN -->
    <!-- ============================================= -->

    <a-plane
      position="-4 2 -3"
      width="2.5"
      height="3"
      color="#222">
    </a-plane>

    <a-text
      value="PDF SCREEN"
      position="-4 2 -2.9"
      align="center"
      width="4"
      color="white">
    </a-text>

    <!-- ============================================= -->
    <!-- IMAGE SCREEN -->
    <!-- ============================================= -->

    <a-image
      id="imagePanel"
      src="#lessonImage"
      position="4 2 -3"
      width="3"
      height="2">
    </a-image>

    <!-- ============================================= -->
    <!-- VIDEO SCREEN -->
    <!-- ============================================= -->

    <a-video
      id="videoScreen"
      src="#lessonVideo"
      position="0 4 -4"
      width="4"
      height="2.2"
      class="clickable">
    </a-video>

    <!-- ============================================= -->
    <!-- CAMERA + MOVEMENT -->
    <!-- ============================================= -->

    <a-entity
      id="rig"
      position="0 0 2">

      <!-- CAMERA -->
      <a-camera
        wasd-controls="acceleration: 30">

        <a-cursor
          raycaster="objects: .clickable"
          fuse="false">
        </a-cursor>

      </a-camera>

      <!-- LEFT CONTROLLER -->
      <a-entity
        id="leftHand"
        laser-controls="hand: left"
        line="color: red">
      </a-entity>

      <!-- RIGHT CONTROLLER -->
      <a-entity
        id="rightHand"
        laser-controls="hand: right"
        line="color: blue">
      </a-entity>

    </a-entity>

  </a-scene>

</body>

</html>
