<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حاسبة الأسعار</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: #111;
    color: #fff;
}

.container {
    margin-top: 50px;
}

input {
    padding: 10px;
    font-size: 18px;
    width: 200px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    background: #00c853;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
}

.result {
    margin-top: 20px;
    font-size: 22px;
    color: #00e676;
}
</style>
</head>

<body>

<div class="container">

<h2>تحويل السعر (+36%)</h2>
<input type="number" id="priceInput" placeholder="اكتب السعر">
<br>
<button onclick="calculatePrice()">احسب</button>
<div class="result" id="priceResult"></div>

<hr>

<h2>حاسبة المشوار (كم)</h2>
<input type="number" id="kmInput" placeholder="عدد الكيلومترات">
<br>
<button onclick="calculateTrip()">احسب</button>
<div class="result" id="tripResult"></div>

</div>

<script>

// دالة التقريب لأقرب 5
function roundToNearest5(num) {
    return Math.round(num / 5) * 5;
}

// دالة إضافة 36%
function addPercentage(num) {
    return num * 1.36;
}

// حساب السعر
function calculatePrice() {
    let price = parseFloat(document.getElementById("priceInput").value);

    if (isNaN(price)) {
        alert("اكتب رقم صحيح");
        return;
    }

    let result = addPercentage(price);
    result = roundToNearest5(result);

    document.getElementById("priceResult").innerText =
        "السعر النهائي: " + result + " درهم";
}

// حساب المشوار
function calculateTrip() {
    let km = parseFloat(document.getElementById("kmInput").value);

    if (isNaN(km)) {
        alert("اكتب رقم صحيح");
        return;
    }

    let base = km * 2;
    let result = addPercentage(base);
    result = roundToNearest5(result);

    document.getElementById("tripResult").innerText =
        "سعر المشوار: " + result + " درهم";
}

</script>

</body>
</html>
